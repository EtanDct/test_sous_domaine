<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCM - Test de connaissances</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        h1 {
            color: #667eea;
            font-size: 28px;
        }

        .counter {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
        }

        .question-section {
            margin: 30px 0;
        }

        .question-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option:hover {
            background: #e3f2fd;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option.selected {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .option.correct {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }

        .option.incorrect {
            background: #dc3545;
            border-color: #dc3545;
            color: white;
        }

        .option.answered {
            cursor: default;
            pointer-events: none;
        }

        .option.answered:hover {
            transform: none;
            background: inherit;
            border-color: inherit;
        }

        .option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .option-label {
            font-size: 16px;
            cursor: pointer;
            flex: 1;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            gap: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-previous {
            background: #6c757d;
            color: white;
        }

        .btn-previous:hover {
            background: #545b62;
            transform: translateY(-2px);
        }

        .btn-previous:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-next {
            background: #667eea;
            color: white;
        }

        .btn-next:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-submit {
            background: #28a745;
            color: white;
        }

        .btn-submit:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .results {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .results.show {
            display: block;
        }

        .score {
            font-size: 48px;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .results-message {
            font-size: 20px;
            color: #333;
            margin: 20px 0;
        }

        .btn-restart {
            background: #667eea;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-restart:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .module-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #667eea;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: 600;
        }

<body>

        </div>

        <div class="progress-bar">

                <div class="options" id="options-container"></div>
            </div>

            <div class="navigation">
                <button class="btn btn-previous" id="btn-previous" onclick="previousQuestion()" disabled>
                    ← Précédent
                </button>
                <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">
                    Suivant →
                </button>
                <button class="btn btn-submit" id="btn-submit" onclick="submitQuiz()" style="display: none;">
                    Terminer le QCM
                </button>
            </div>
        </div>

        <div class="results" id="results-section">
            <h2>Résultats du QCM</h2>
            <div class="score" id="final-score"></div>
            <div class="results-message" id="results-message"></div>
            <button class="btn btn-restart" onclick="restartQuiz()">Recommencer le QCM</button>
        </div>
    </div>

        let currentQuestion = 0;
        let userAnswers = new Array(questions.length).fill(null);

        function displayQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('current-question').textContent = currentQuestion + 1;
            document.getElementById('total-questions').textContent = questions.length;
            document.getElementById('module-tag').textContent = question.module;
            document.getElementById('question-text').textContent = question.question;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            const alreadyAnswered = userAnswers[currentQuestion] !== null;
            const correctIndex = question.correct;

            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'answer';
                radio.value = index;
                radio.id = `option-${index}`;
                radio.checked = userAnswers[currentQuestion] === index;

                if (alreadyAnswered) {
                    // Restaurer le feedback correct/incorrect
                    optionDiv.classList.add('answered');
                    radio.disabled = true;
                    if (index === correctIndex) {
                        optionDiv.classList.add('correct');
                    }
                    if (index === userAnswers[currentQuestion] && index !== correctIndex) {
                        optionDiv.classList.add('incorrect');
                    }
                } else {
                    radio.onchange = () => selectAnswer(index);
                    optionDiv.onclick = () => {
                        radio.checked = true;
                        selectAnswer(index);
                    };
                }

                const label = document.createElement('label');
                label.htmlFor = `option-${index}`;
                label.className = 'option-label';
                label.textContent = option;

                optionDiv.appendChild(radio);
                optionDiv.appendChild(label);
                optionsContainer.appendChild(optionDiv);
            });

            // Update button visibility
            document.getElementById('btn-previous').disabled = currentQuestion === 0;
            
            if (currentQuestion === questions.length - 1) {
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('btn-submit').style.display = 'block';
            } else {
                document.getElementById('btn-next').style.display = 'block';
                document.getElementById('btn-submit').style.display = 'none';
            }

            // Update progress bar
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        function selectAnswer(index) {
            // Ne permet pas de changer une réponse déjà donnée
            if (userAnswers[currentQuestion] !== null) return;

            userAnswers[currentQuestion] = index;

            const correctIndex = questions[currentQuestion].correct;
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                // Désactiver toutes les options après réponse
                opt.classList.add('answered');

                if (i === correctIndex) {
                    opt.classList.add('correct');
                }
                if (i === index && index !== correctIndex) {
                    opt.classList.add('incorrect');
                }
            });
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                displayQuestion();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        function submitQuiz() {
            let score = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] === questions[i].correct) {
                    score++;
                }
            }

            const percentage = (score / questions.length) * 100;
            
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('results-section').classList.add('show');
            document.getElementById('final-score').textContent = `${score} / ${questions.length}`;
            
            let message = '';
            if (percentage >= 90) {
                message = '🎉 Excellent ! Vous maîtrisez parfaitement le sujet !';
            } else if (percentage >= 75) {
                message = '👍 Très bien ! Vous avez une bonne compréhension du sujet.';
            } else if (percentage >= 60) {
                message = '✓ Bien ! Il reste quelques points à améliorer.';
            } else {
                message = '📚 Continuez vos efforts, vous êtes sur la bonne voie !';
            }
            
            document.getElementById('results-message').textContent = message;
        }

        function restartQuiz() {
            currentQuestion = 0;
            userAnswers = new Array(questions.length).fill(null);
            document.getElementById('quiz-section').style.display = 'block';
            document.getElementById('results-section').classList.remove('show');
            displayQuestion();
        }

        // Initialize quiz
        displayQuestion();
    </script>
</body>
</html>
